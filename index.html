<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your NYC Margdarshak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F3EE;
  --purple: #7B4FD4;
  --purple-light: #F0E6FF;
  --purple-mid: #C4A0F0;
  --text: #151515;
  --muted: #888;
  --border: #E5DDD4;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); font-family: Inter, sans-serif; color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── HOME ── */
.home-wrap { padding: 44px 24px 0; position: relative; }

.top-label { font-size: 11px; letter-spacing: 0.12em; color: #999; text-transform: uppercase; line-height: 1.8; }
.top-label span { color: var(--purple); }

/* floating doodles */
.doodle-moon { position: absolute; top: 36px; right: 24px; font-size: 2.4rem; }
.doodle-star { position: absolute; color: var(--purple-mid); font-size: 1.1rem; }
.doodle-star.s1 { top: 52px; right: 72px; }
.doodle-star.s2 { top: 90px; right: 42px; font-size: 0.8rem; }
.doodle-star.s3 { top: 44px; right: 110px; font-size: 0.7rem; }

/* hero */
.hero { text-align: center; padding-top: 28px; }
.hero h1 { font-family: 'Instrument Serif', serif; font-size: 42px; font-weight: 400; line-height: 1.05; letter-spacing: -0.5px; }
.hero h1 .purple-italic { display: block; color: var(--purple); font-style: italic; font-size: 46px; }
.hero .tagline { font-family: 'Caveat', cursive; font-size: 22px; color: var(--text); margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.hero .tagline::before { content: '→'; color: var(--purple); font-family: serif; }
.hero .flags { margin-top: 10px; font-size: 22px; letter-spacing: 4px; }

/* search */
.search-wrap { margin-top: 32px; }
.section-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.search-box { background: var(--white); border-radius: 20px; border: 1px solid var(--border); padding: 6px 6px 6px 18px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.04); }
.search-box input { flex: 1; border: none; outline: none; font-size: 14px; color: var(--text); background: transparent; font-family: Inter, sans-serif; padding: 8px 0; }
.search-box input::placeholder { color: #bbb; }
.search-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--purple-light); color: var(--purple); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.search-btn:hover { background: #e0ccff; }
.qa-response { margin-top: 12px; font-size: 14px; color: #555; line-height: 1.65; background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; display: none; }

/* divider */
.divider { display: flex; align-items: center; gap: 14px; margin: 28px 0 22px; color: var(--muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span::before, .divider span::after { content: ' ✦ '; color: var(--purple-mid); }

/* cards */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0; }
.card { background: var(--white); border-radius: 22px; border: 1px solid var(--border); padding: 20px 16px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
.card:active { transform: scale(0.97); }
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
.card.purple { background: var(--purple-light); border-color: var(--purple-mid); }
.card-icon { width: 48px; height: 48px; background: var(--bg); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 14px; }
.card.purple .card-icon { background: rgba(123,79,212,0.1); }
.card h3 { font-family: 'Instrument Serif', serif; font-size: 19px; font-weight: 400; line-height: 1.2; margin-bottom: 6px; }
.card p { font-size: 12px; color: var(--muted); line-height: 1.5; font-style: italic; }
.card.purple p { color: var(--purple); }
.card-arrow { position: absolute; top: 18px; right: 16px; color: #ccc; font-size: 18px; }
.card.purple .card-arrow { color: var(--purple-mid); }

/* illustration */
.illustration-wrap { margin-top: 32px; width: calc(100% + 48px); margin-left: -24px; overflow: hidden; }

/* ── RESULTS SCREEN ── */
.results-wrap { padding: 48px 24px 48px; }
.results-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.back-btn { background: var(--white); border: 1px solid var(--border); color: var(--text); border-radius: 50%; width: 38px; height: 38px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; }
.results-header h2 { font-family: 'Instrument Serif', serif; font-size: 24px; font-weight: 400; }
.results-header h2 em { font-style: italic; color: var(--purple); }

/* loading */
.loading { display: none; text-align: center; padding: 60px 0; }
.loading-dot { display: inline-block; width: 7px; height: 7px; background: var(--purple-mid); border-radius: 50%; margin: 0 3px; animation: pulse 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.7); } 40% { opacity: 1; transform: scale(1.15); } }
.loading p { color: var(--muted); font-size: 13px; margin-top: 14px; }

/* filter bar */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.filter-btn { font-size: 12px; font-family: Inter, sans-serif; font-weight: 500; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--purple); color: white; border-color: var(--purple); }
.nishi-filter-btn { border-color: var(--purple-mid); color: var(--purple); }
.nishi-filter-btn.active { background: var(--purple); color: white; }

/* Nishi pick card */
.place-card.nishi-pick { background: var(--purple-light); border-color: var(--purple-mid); }
.place-card.nishi-pick .place-name { color: var(--text); }
.place-card.nishi-pick .place-desc { color: #555; }
.nishi-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--purple); background: white; border: 1px solid var(--purple-mid); border-radius: 20px; padding: 2px 10px; margin-bottom: 8px; letter-spacing: 0.04em; }

/* place cards */
.places-list { margin-bottom: 24px; }
.place-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 18px 20px; margin-bottom: 10px; }
.place-card .place-name { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: 400; margin-bottom: 4px; }
.place-card .place-cuisine { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.place-card .place-desc { font-size: 13px; color: #666; line-height: 1.65; margin-bottom: 14px; }
.place-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.place-distance { font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
.place-vibe { font-size: 11px; padding: 3px 10px; border-radius: 20px; }
.place-vibe.good { background: #edf7f0; color: #2a7a4a; border: 1px solid #b8e0c8; }
.place-vibe.skip { background: #fff3f3; color: #a04040; border: 1px solid #f0c8c8; }
.place-rating { font-size: 11px; color: #92711a; background: #fdf8ec; border: 1px solid #f0d980; padding: 3px 10px; border-radius: 20px; }
.place-price { font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
.maps-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--purple); text-decoration: none; background: var(--purple-light); border: 1px solid var(--purple-mid); padding: 7px 14px; border-radius: 20px; transition: background 0.15s; }
.maps-link:hover { background: #e4d0ff; }

/* subway */
.subway-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.subway-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
.subway-badge { width: 40px; height: 40px; border-radius: 50%; background: #ee352e; color: white; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.subway-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.subway-detail { font-size: 12px; color: var(--muted); }

/* error */
.error-msg { display: none; background: #fff5f5; border: 1px solid #fdd; border-radius: 16px; padding: 16px 18px; font-size: 14px; color: #c04040; line-height: 1.5; }
</style>
</head>

  el.style.display = 'block';
}
function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function nearestSubways(lat, lng, count = 2) {
  return SUBWAY_STATIONS
    .map(s => ({ ...s, dist: haversineDistance(lat, lng, s.lat, s.lng) }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, count);
}
function nearestSubway(lat, lng) {
  return SUBWAY_STATIONS.reduce((best, s) => {
    const d = haversineDistance(lat, lng, s.lat, s.lng);
    return d < best.dist ? { ...s, dist: d } : best;
  }, { dist: Infinity });
}
function metersToWalk(m) {
  const mins = Math.round((m * 1.4) / 70);
  return mins <= 1 ? "1 min walk" : `~${mins} min walk`;
}
function renderPlaces(places, lat, lng) {
  currentPlaces = places;
  document.getElementById('loading').style.display = 'none';
  const list = document.getElementById('places-list');
  list.innerHTML = '';
  places.forEach(p => {
    const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(p.name + ' New York City')}`;
    const card = document.createElement('div');
    card.className = p.isNishiPick ? 'place-card nishi-pick' : 'place-card';
    const badgeHtml = p.isNishiPick ? `<div class="nishi-badge">✦ Nishi's pick</div>` : '';
    const distHtml = p.dist ? `<span class="place-distance">⟶ ${metersToWalk(p.dist)}</span>` : '';
    const ratingHtml = p.rating ? `<span class="place-rating">⭐ ${p.rating} ${formatReviews(p.reviewCount)}</span>` : '';
    const priceHtml = p.priceLevel ? `<span class="place-price">${priceLabel(p.priceLevel)}</span>` : '';
    const vibeHtml = p.isNishiPick ? '' : vibeTag(p.types);
    const cuisine = cuisineLabel(p.types);
    const cuisineHtml = cuisine ? `<div class="place-cuisine">${cuisine}</div>` : '';
    const desc = p.description || (p.isNishiPick ? '' : (p.editorialSummary || ''));
    const descHtml = desc ? `<div class="place-desc">${desc}</div>` : '';
    card.innerHTML = `${badgeHtml}<div class="place-name">${p.name}</div>${cuisineHtml}${descHtml}<div class="place-meta">${distHtml}${ratingHtml}${priceHtml}${vibeHtml}</div><a class="maps-link" href="${mapsUrl}" target="_blank">↗ Open in Google Maps</a>`;
    list.appendChild(card);
  });
  const subs = nearestSubways(lat, lng, 2);
  const cardsList = document.getElementById('subway-cards-list');
  cardsList.innerHTML = subs.map(sub => `
    <div class="subway-card" style="margin-bottom:8px;">
      <div class="subway-badge" style="background:${sub.color}">${sub.lines.split(' ')[0]}</div>
      <div style="flex:1;">
        <div class="subway-name">${sub.name}</div>
        <div class="subway-detail">${metersToWalk(sub.dist)} · Lines ${sub.lines}</div>
      </div>
      <a href="https://maps.google.com/?q=${encodeURIComponent(sub.name + ' subway station New York City')}" target="_blank" class="maps-link" style="margin:0; flex-shrink:0; font-size:11px;">↗ Maps</a>
    </div>
  `).join('');
  document.getElementById('transit-link').href = `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&travelmode=transit`;
  document.getElementById('subway-section').style.display = 'block';
}

  document.getElementById('results-title').innerHTML = 'What\'s <em>nearby</em>';
  document.getElementById('filter-bar').style.display = 'flex';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  showResults();
  setLoading("Finding your location...");
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      currentLat = lat; currentLng = lng;
      setLoading("Finding what's nearby...");
      fetchNearby(lat, lng);
    },
    () => showError("Couldn't get your location. Open this in Chrome (not Safari) for testing, or deploy to Vercel for full mobile access.")
  );
}

function applyFilter(cat) {
  if (!currentLat) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));

  if (cat === 'all') {
    renderPlaces(allPlaces, currentLat, currentLng);
    return;
  }

  if (cat === 'nishi') {
    const filtered = allPlaces.filter(p => p.isNishiPick);
    filtered.length
      ? renderPlaces(filtered, currentLat, currentLng)
      : showEmpty("No Nishi picks within range right now.");
    return;
  }

  // For Food / Cafe / Parks / Sights — fetch fresh from Google with specific types
  setLoading(`Finding ${cat} spots nearby...`);
  const includedTypes = CATEGORY_TYPES[cat] || [];
  const nishiForCat = allPlaces.filter(p => p.isNishiPick && p.category === cat);

  fetch('/api/places', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ mode: 'nearby', lat: currentLat, lng: currentLng, radius: 1000, includedTypes })
  })
  .then(r => r.json())
  .then(googlePlaces => {
    const skip = ['transit_station', 'subway_station', 'bus_station', 'lodging', 'gas_station', 'atm', 'bank', 'parking'];
    const nishiNames = new Set(nishiForCat.map(p => p.name.toLowerCase()));
    const googleFiltered = googlePlaces
      .filter(p => !p.types?.some(t => skip.includes(t)))
      .filter(p => !nishiNames.has(p.displayName?.text?.toLowerCase()))
      .map(p => ({
        name: p.displayName?.text,
        isNishiPick: false,
        dist: p.location ? haversineDistance(currentLat, currentLng, p.location.latitude, p.location.longitude) : null,
        rating: p.rating,
        reviewCount: p.userRatingCount,
        priceLevel: p.priceLevel,
        types: p.types,
        editorialSummary: p.editorialSummary?.text || ''
      }));
    const combined = [...nishiForCat, ...googleFiltered].sort((a, b) => (a.dist || 9999) - (b.dist || 9999));
    combined.length
      ? renderPlaces(combined, currentLat, currentLng)
      : showEmpty(`No ${cat} spots found nearby — tap All to see everything.`);
  })
  .catch(() => {
    nishiForCat.length
      ? renderPlaces(nishiForCat, currentLat, currentLng)
      : showEmpty(`No ${cat} spots found nearby — tap All to see everything.`);
  });
}

function showEmpty(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('places-list').innerHTML = `<p style="color:var(--muted);font-size:14px;padding:16px 0;">${msg}</p>`;
}

function formatReviews(n) {
  if (!n) return '';
  return n >= 1000 ? `(${(n/1000).toFixed(1)}k)` : `(${n})`;
}
function priceLabel(level) {
  const map = { PRICE_LEVEL_FREE: 'Free', PRICE_LEVEL_INEXPENSIVE: '$', PRICE_LEVEL_MODERATE: '$$', PRICE_LEVEL_EXPENSIVE: '$$$', PRICE_LEVEL_VERY_EXPENSIVE: '$$$$' };
  return map[level] || null;
}
function cuisineLabel(types) {
  if (!types) return '';
  const map = {
    ramen_restaurant: 'Ramen', sushi_restaurant: 'Sushi', japanese_restaurant: 'Japanese',
    chinese_restaurant: 'Chinese', korean_restaurant: 'Korean', thai_restaurant: 'Thai',
    italian_restaurant: 'Italian', pizza_restaurant: 'Pizza', mexican_restaurant: 'Mexican',
    indian_restaurant: 'Indian', mediterranean_restaurant: 'Mediterranean',
    american_restaurant: 'American', hamburger_restaurant: 'Burgers',
    french_restaurant: 'French', spanish_restaurant: 'Spanish',
    middle_eastern_restaurant: 'Middle Eastern', vietnamese_restaurant: 'Vietnamese',
    brunch_restaurant: 'Brunch', vegan_restaurant: 'Vegan', vegetarian_restaurant: 'Vegetarian',
    fast_food_restaurant: 'Fast Food', deli: 'Deli', sandwich_shop: 'Sandwiches',
    bagel_shop: 'Bagels', bakery: 'Bakery', cafe: 'Café', coffee_shop: 'Coffee',
    ice_cream_shop: 'Ice Cream', dessert_shop: 'Dessert', bar: 'Bar',
    park: 'Park', national_park: 'National Park', garden: 'Garden',
    botanical_garden: 'Botanical Garden', museum: 'Museum', art_gallery: 'Art Gallery',
    observation_deck: 'Observation Deck', tourist_attraction: 'Attraction',
    historical_landmark: 'Landmark', book_store: 'Bookstore',
    performing_arts_theater: 'Theater', movie_theater: 'Cinema',
    restaurant: 'Restaurant'
  };
  for (const t of types) { if (map[t]) return map[t]; }
  return '';
}
function vibeTag(types) {
  if (!types) return '';
  const bad = ['night_club', 'casino'];
  const good = ['cafe', 'park', 'museum', 'book_store', 'art_gallery', 'bakery', 'tourist_attraction', 'spa'];
  if (types.some(t => bad.includes(t))) return '<span class="place-vibe skip">not her vibe</span>';
  if (types.some(t => good.includes(t))) return '<span class="place-vibe good">chill ✓</span>';
  return '';
}
async function enrichWithPlaces(places) {
  return Promise.all(places.map(async p => {
    try {
      const r = await fetch('/api/places', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ query: `${p.name} New York City` })
      });
      const d = await r.json();
      return { ...p, rating: d.rating, reviewCount: d.userRatingCount, priceLevel: d.priceLevel, types: d.types };
    } catch { return p; }
  }));
}

function parseClaudeJSON(text) {
  // Claude sometimes wraps JSON in ```json ... ``` — strip it before parsing
  return JSON.parse(text.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim());
}

function fetchNearby(lat, lng) {
  // Step 1: Get Nishi's picks within 1.5km — mark them, sort by distance
  const nishiNearby = NISHI_PICKS
    .map(p => ({ ...p, dist: haversineDistance(lat, lng, p.lat, p.lng), isNishiPick: true }))
    .filter(p => p.dist <= 1500)
    .sort((a, b) => a.dist - b.dist);

  // Step 2: Get real nearby places from Google
  fetch('/api/places', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ mode: 'nearby', lat, lng, radius: 1000 })
  })
  .then(r => r.json())
  .then(googlePlaces => {
    // Filter out noise (transit, banks, hotels, parking) and places already in Nishi's picks
    const skip = ['transit_station', 'subway_station', 'bus_station', 'lodging', 'gas_station', 'atm', 'bank', 'parking', 'car_wash', 'car_dealer', 'office', 'corporate_office', 'government_office', 'local_government_office', 'city_hall', 'post_office', 'courthouse', 'embassy', 'insurance_agency', 'real_estate_agency', 'accounting', 'lawyer', 'doctor', 'dentist', 'hospital', 'pharmacy', 'physiotherapist'];
    const nishiNames = new Set(nishiNearby.map(p => p.name.toLowerCase()));
    const googleFiltered = googlePlaces
      .filter(p => !p.types?.some(t => skip.includes(t)))
      .filter(p => !nishiNames.has(p.displayName?.text?.toLowerCase()))
      .slice(0, 12)
      .map(p => ({
        name: p.displayName?.text,
        isNishiPick: false,
        dist: p.location ? haversineDistance(lat, lng, p.location.latitude, p.location.longitude) : null,
        rating: p.rating,
        reviewCount: p.userRatingCount,
        priceLevel: p.priceLevel,
        types: p.types,
        editorialSummary: p.editorialSummary?.text || ''
      }));

    // Only enrich Nishi picks with ratings — Google results already have their data, don't touch them
    enrichWithPlaces(nishiNearby).then(enrichedNishi => {
      const combined = [...enrichedNishi, ...googleFiltered].sort((a, b) => (a.dist || 9999) - (b.dist || 9999));
      allPlaces = combined;
      renderPlaces(combined, lat, lng);
    });
  })
  .catch(() => {
    // If Google fails, still show Nishi's picks
    if (nishiNearby.length) {
      enrichWithPlaces(nishiNearby).then(enriched => {
        allPlaces = enriched;
        renderPlaces(enriched, lat, lng);
      });
    } else {
      showError("Couldn't find places nearby. Make sure you're in New York City!");
    }
  });
}

function askNYC() {
  const q = document.getElementById('qa-input').value.trim();
  if (!q) return;
  const responseEl = document.getElementById('qa-response');
  responseEl.textContent = "...";
  responseEl.style.display = 'block';
  fetch("/api/claude", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001", max_tokens: 300,
      system: `You are a knowledgeable NYC guide for Abhiruchi, a visitor who loves chill spots — craft beer, cafes, parks, low-key neighbourhood places. She does not like clubs or dancing. Answer questions about New York City only. If unrelated, reply: "I'm your NYC Margdarshak — ask me something about New York!" Keep answers brief, warm, useful. No bullet points.`,
      messages: [{ role: "user", content: q }]
    })
  }).then(r => r.json()).then(data => {
    responseEl.innerHTML = data.content[0].text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  })
  .catch(() => { responseEl.textContent = "Something went wrong. Please try again."; });
}

document.getElementById('qa-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); askNYC(); }
});
